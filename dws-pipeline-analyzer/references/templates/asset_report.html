// ── 步骤高亮交互 ──
var highlightedStep = null;

function initLineageHighlight() {
  var wrapper = document.getElementById('lineageWrapper');
  if (!wrapper) return;

  // 点击节点
  wrapper.addEventListener('click', function(e) {
    var nodeEl = e.target.closest('.lh-node');
    if (!nodeEl) {
      // 点击空白处取消高亮
      clearHighlight();
      return;
    }
    var nodeId = nodeEl.getAttribute('data-id');
    var nodeType = nodeEl.getAttribute('data-type');
    // 步骤和来源表都可以点击高亮
    highlightStep(nodeId);
  });
}

function highlightStep(nodeId) {
  highlightedStep = nodeId;
  var edges = REPORT_DATA.lineage.edges || [];
  var nodes = REPORT_DATA.lineage.nodes || [];

  // 找到该步骤的直接来源节点和去向节点
  var related = new Set([nodeId]);
  edges.forEach(function(e) {
    if (e.to === nodeId) related.add(e.from);
    if (e.from === nodeId) related.add(e.to);
  });

  // 应用样式
  var allNodes = document.querySelectorAll('#lineageWrapper .lh-node');
  var allEdges = document.querySelectorAll('#lineageWrapper .edge-path');

  allNodes.forEach(function(g) {
    var id = g.getAttribute('data-id');
    if (related.has(id)) {
      g.style.opacity = '1';
      g.querySelector('.node-rect').style.strokeWidth = '2.5';
    } else {
      g.style.opacity = '0.2';
    }
  });

  allEdges.forEach(function(path) {
    var from = path.getAttribute('data-from');
    var to = path.getAttribute('data-to');
    if (related.has(from) && related.has(to)) {
      path.style.opacity = '1';
      path.style.strokeWidth = '2';
    } else {
      path.style.opacity = '0.1';
    }
  });
}

function clearHighlight() {
  highlightedStep = null;
  var allNodes = document.querySelectorAll('#lineageWrapper .lh-node');
  var allEdges = document.querySelectorAll('#lineageWrapper .edge-path');
  allNodes.forEach(function(g) {
    g.style.opacity = '1';
    g.querySelector('.node-rect').style.strokeWidth = '1';
  });
  allEdges.forEach(function(path) {
    path.style.opacity = '1';
    path.style.strokeWidth = '1';
  });
}

// ── 数据流向图缩放/拖拽 ──
var lineageScale = 1;
var lineagePanX = 0;
var lineagePanY = 0;

function lineageZoom(factor) {
  lineageScale = Math.max(0.3, Math.min(3, lineageScale * factor));
  applyLineageTransform();
}

function lineageZoomReset() {
  lineageScale = 1;
  lineagePanX = 0;
  lineagePanY = 0;
  applyLineageTransform();
}

function applyLineageTransform() {
  var content = document.querySelector('#lineageWrapper #lineageContent');
  if (content) {
    content.setAttribute('transform', 'translate(' + lineagePanX + ',' + lineagePanY + ') scale(' + lineageScale + ')');
  }
}

function initLineageZoom() {
  var wrapper = document.getElementById('lineageWrapper');
  var svgEl = wrapper ? wrapper.querySelector('svg') : null;
  if (!svgEl) return;
  // 防止对同一个 SVG 重复绑定（SVG 重建后需重新绑定）
  if (svgEl._zoomBound) return;
  svgEl._zoomBound = true;

  // 把 SVG 子元素包到一个 g 容器里（用于 transform）
  var content = svgEl.querySelector('#lineageContent');
  if (!content) {
    content = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    content.setAttribute('id', 'lineageContent');
    while (svgEl.firstChild) {
      content.appendChild(svgEl.firstChild);
    }
    svgEl.appendChild(content);
  }

  // 滚轮缩放
  wrapper.addEventListener('wheel', function(e) {
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : 0.9;
    lineageZoom(factor);
  }, { passive: false });

  // 拖拽平移
  var isDragging = false;
  var startX = 0, startY = 0;
  var startPanX = 0, startPanY = 0;

  svgEl.style.cursor = 'grab';
  svgEl.addEventListener('mousedown', function(e) {
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    startPanX = lineagePanX;
    startPanY = lineagePanY;
    svgEl.style.cursor = 'grabbing';
  });

  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    lineagePanX = startPanX + (e.clientX - startX);
    lineagePanY = startPanY + (e.clientY - startY);
    applyLineageTransform();
  });

  document.addEventListener('mouseup', function() {
    isDragging = false;
    svgEl.style.cursor = 'grab';
  });
}

// ================================================================
// Section 4: Render Schema Table
// ================================================================
// ================================================================
// Section: Render Steps
// ================================================================
function renderSteps() {
  var steps = REPORT_DATA.steps || [];
  document.getElementById('stepsCount').textContent = '(' + steps.length + ' 步骤)';

  if (steps.length === 0) {
    document.getElementById('stepsContainer').innerHTML = '<div class="no-results">无步骤数据</div>';
    return;
  }

  // 按拓扑序排序：exec_sequence 升序，同序列内公共步骤排最后
  steps.sort(function(a, b) {
    if ((a.exec_sequence || 0) !== (b.exec_sequence || 0)) {
      return (a.exec_sequence || 0) - (b.exec_sequence || 0);
    }
    var scA = a.scenario_name || '';
    var scB = b.scenario_name || '';
    if (scA === '公共步骤') return 1;
    if (scB === '公共步骤') return -1;
    return scA.localeCompare(scB);
  });

  var html = '';
  steps.forEach(function(step, idx) {
    var isOpen = idx === 0 ? ' open' : '';
    html += '<div class="step-card' + isOpen + '">';
    html += '<div class="step-card-header" onclick="toggleStepCard(this)">';
    html += '<span class="step-toggle">&#9654;</span>';
    html += '<div class="step-title-block">';
    // 场景标签
    var scenarioLabel = step.scenario_name || '';
    var scenarioColor = step.is_common_step ? '#6b7280' : (scenarioLabel.includes('1') ? '#8b5cf6' : '#3b82f6');
    if (scenarioLabel) {
      html += '<span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;color:white;background:' + scenarioColor + ';margin-right:8px;vertical-align:middle;">' + escapeHtml(scenarioLabel) + '</span>';
    }
    html += '<span class="step-title">' + escapeHtml(step.rule_name || step.step_id || '?');
    if (step.rule_code) html += ' <span style="color:var(--text-muted);font-weight:400;font-size:12px;">(' + escapeHtml(step.rule_code) + ')</span>';
    // I 视图步骤标注
    if (step.is_view_step) {
      html += ' <span style="display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;color:#4338ca;background:#e0e7ff;border:1px dashed #818cf8;vertical-align:middle;margin-left:4px;">视图封装</span>';
    }
    html += '</span>';
    html += '</div>';
    // Right side: delete_mode_label + exec_sequence
    if (step.delete_mode_label) {
      html += '<span class="write-mode-tag">' + escapeHtml(step.delete_mode_label) + '</span>';
    }
    html += '<span class="exec-seq">seq=' + (step.exec_sequence || 0) + '</span>';
    html += '</div>';

    // Body
    html += '<div class="step-body"><div class="step-body-inner">';

    // Purpose (总结性目的)
    if (step.purpose) {
      html += '<div class="step-purpose" style="font-size:14px;font-weight:600;color:var(--accent);margin-bottom:8px;">' + escapeHtml(step.purpose) + '</div>';
    }

    // 逻辑块展示（加工逻辑）— 递归渲染嵌套结构
    var blocks = step.data_blocks || [];
    if (blocks.length > 0) {
      html += '<details style="margin:8px 0 0;padding:0;background:var(--bg-card);border-radius:6px;border:1px solid var(--border);" open>';
      html += '<summary style="cursor:pointer;font-size:12px;font-weight:700;color:var(--text-secondary);padding:10px 12px;">逻辑块（' + blocks.length + '）</summary>';
      html += '<div style="padding:4px 12px 10px;">';

      function renderBlock(blk, depth) {
        var indent = depth * 16;
        var isSubquery = blk.type === 'subquery' || (blk.children && blk.children.length > 0);
        var colorMap = {'main': '#3b82f6', 'inner_main': '#3b82f6', 'secondary': '#22c55e',
                        'inner_secondary': '#22c55e', 'subquery': '#8b5cf6', 'union_branch': '#f97316'};
        var color = colorMap[blk.type] || '#64748b';
        var opsLabel = (blk.ops && blk.ops.length) ? ' <span style="font-size:10px;color:#f97316;">[' + blk.ops.join('、') + ']</span>' : '';

        var h = '<div style="margin-bottom:6px;margin-left:' + indent + 'px;padding-left:8px;border-left:3px solid ' + color + ';">';
        h += '<div style="font-size:13px;line-height:1.5;">';
        h += '<span style="font-weight:600;color:' + color + ';">' + escapeHtml(blk.role || '') + '</span> ';
        h += '<code style="color:var(--accent);">' + escapeHtml(blk.table) + '</code>';
        if (blk.alias) h += ' <span style="color:var(--text-muted);">(' + escapeHtml(blk.alias) + ')</span>';
        h += opsLabel;
        h += '</div>';

        if (blk.join_type && blk.join_type !== 'FROM') {
          h += '<div style="font-size:12px;color:var(--text-secondary);padding-left:8px;">' + escapeHtml(blk.join_type) + (blk.on_condition ? ' ON ' + escapeHtml(blk.on_condition) : '') + '</div>';
        }
        if (blk.brought_fields && blk.brought_fields.length > 0) {
          var fieldsHtml = blk.brought_fields.map(function(f) {
            if (typeof f === 'string') return escapeHtml(f);
            var name = escapeHtml(f.name || '');
            var tt = f.type ? ' <span style="font-size:10px;color:#f97316;font-weight:600;">[' + escapeHtml(f.type) + ']</span>' : '';
            return name + tt;
          }).join('、');
          h += '<div style="font-size:11px;color:var(--text-muted);padding-left:8px;">带出：' + fieldsHtml + '</div>';
        }
        if (blk.purpose) {
          h += '<div style="font-size:11px;color:var(--accent);font-style:italic;padding-left:8px;">' + escapeHtml(blk.purpose) + '</div>';
        }
        if (blk.where_clause) {
          h += '<div style="font-size:11px;color:#ef4444;padding-left:8px;">过滤: <code style="font-size:10px;">' + escapeHtml(blk.where_clause) + '</code></div>';
        }
        if (blk.group_by && blk.group_by.length > 0) {
          h += '<div style="font-size:11px;color:#f97316;padding-left:8px;">收敛: ' + escapeHtml(blk.group_by.join(', ')) + '</div>';
        }
        h += '</div>';

        // 递归渲染子块
        if (blk.children && blk.children.length > 0) {
          blk.children.forEach(function(child) {
            h += renderBlock(child, depth + 1);
          });
        }
        return h;
      }

      blocks.forEach(function(blk) {
        html += renderBlock(blk, 0);
      });

      html += '</div>';
      html += '</details>';
    }

    // SQL 全文（折叠）
    if (step.raw_sql) {
      html += '<details style="margin-top:12px;">';
      html += '<summary style="cursor:pointer;font-size:12px;color:var(--text-muted);font-weight:600;">SQL 全文</summary>';
      html += '<pre class="sql-block" style="margin-top:8px;"><code>' + highlightSQL(step.raw_sql) + '</code></pre>';
      html += '</details>';
    }

    html += '</div></div>'; // end body
    html += '</div>'; // end step-card
  });

  document.getElementById('stepsContainer').innerHTML = html;
}

function toggleStepCard(header) {
  var card = header.closest('.step-card');
  card.classList.toggle('open');
}

// ================================================================
// Section 6: Render Field Mapping
// ================================================================
function renderFieldMapping() {
  var fields = REPORT_DATA.fields || [];
  var auxFields = REPORT_DATA.auxiliary_fields || [];

  // 标题分类统计
  document.getElementById('fieldMappingCount').textContent = '(' + fields.length + ' 写入 + ' + auxFields.length + ' 辅助)';
  document.getElementById('writeFieldsCount').textContent = '(' + fields.length + ')';
  document.getElementById('auxFieldsCount').textContent = '(' + auxFields.length + ')';

  if (fields.length === 0) {
    document.getElementById('fieldMappingTable').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);">无字段映射数据（可能是 SELECT * 或 SQL 解析失败）</div>';
    return;
  }

  var usageMap = REPORT_DATA.field_usage_map || {};
  var schemaMap = {};
  (REPORT_DATA.schema_fields || []).forEach(function(sf) { schemaMap[sf.name.toLowerCase()] = sf; });

  var html = '<thead><tr>' +
    '<th style="width:4%">#</th>' +
    '<th style="width:15%">目标字段</th>' +
    '<th style="width:9%">类型</th>' +
    '<th style="width:17%">业务含义</th>' +
    '<th style="width:23%">最初来源</th>' +
    '<th style="width:14%">角色</th>' +
    '<th style="width:10%">链路</th>' +
    '<th style="width:8%">步骤</th>' +
    '</tr></thead><tbody>';

  fields.forEach(function(f, fi) {
    var sf = schemaMap[f.target_field.toLowerCase()] || {};
    var originSources = f.origin_sources || f.sources || [];
    var srcText = '-';
    if (originSources.length > 0) {
      srcText = originSources.map(function(s) {
        var tbl = (s.table || '').split('.').pop();
        var base = tbl + '.' + (s.field || '?');
        // UNION 分支来源标注分支号（纯文本，单元格会 escapeHtml）
        if (s.branch) {
          return '[分支' + s.branch + '] ' + base;
        }
        return base;
      }).join(' / ');
    }

    // 角色标签（加工类型 + 关联/过滤/分组）
    var ttLabel = {'direct':'直取','value':'赋值','aggregate':'聚合','pivot':'行转列',
                   'window':'窗口','fallback':'兜底','case_when':'条件','expression':'加工','unknown':'未知'};
    var ttColor = {'direct':'#22c55e','value':'#6b7280','aggregate':'#f97316','pivot':'#8b5cf6',
                   'window':'#3b82f6','fallback':'#eab308','case_when':'#ec4899','expression':'#6366f1','unknown':'#94a3b8'};
    var tt = f.transform_type || 'expression';
    var roleHtml = '<span style="display:inline-block;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:600;color:white;background:' + (ttColor[tt]||'#94a3b8') + ';">' + (ttLabel[tt]||tt) + '</span>';

    // 加上使用角色标签
    var fu = usageMap[f.target_field.toLowerCase()];
    if (fu) {
      if (fu.join && fu.join.length > 0) {
        roleHtml += ' <span style="display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:600;color:white;background:#f97316;">关联</span>';
      }
      if (fu.groupby && fu.groupby.length > 0) {
        roleHtml += ' <span style="display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:600;color:white;background:#8b5cf6;">分组</span>';
      }
      if (fu.where && fu.where.length > 0) {
        roleHtml += ' <span style="display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:600;color:white;background:#3b82f6;">过滤</span>';
      }
    }

    // 步骤编码
    var st = (REPORT_DATA.steps || []).find(function(s) { return s.step_id === f.producing_step; });
    var stepCode = st ? (st.rule_code || st.step_id) : '-';

    html += '<tr data-field="' + escapeHtml(f.target_field) + '" onmouseup="if(!window.getSelection().toString())openDetail(\'' + escapeHtml(f.target_field) + '\')" style="cursor:pointer;' + (f.is_final_field === false ? 'opacity:0.6;' : '') + '">';
    html += '<td style="font-size:12px;color:var(--text-muted);">' + (fi + 1) + '</td>';
    var fieldBadge = f.is_final_field === false ? ' <span style="font-size:9px;padding:1px 5px;border-radius:4px;background:#fef9c3;color:#854d0e;vertical-align:middle;">中间过程</span>' : '';
    // I 视图穿透标注（基于字段属性，不是步骤判断）
    if (f.is_view_inherited) {
      fieldBadge += ' <span style="font-size:9px;padding:1px 5px;border-radius:4px;background:#e0e7ff;color:#4338ca;vertical-align:middle;">穿透F表</span>';
    } else if (f.is_view_extra) {
      fieldBadge += ' <span style="font-size:9px;padding:1px 5px;border-radius:4px;background:#dcfce7;color:#166534;vertical-align:middle;">I视图独有</span>';
    } else if (f.is_base_only) {
      fieldBadge += ' <span style="font-size:9px;padding:1px 5px;border-radius:4px;background:#fef9c3;color:#854d0e;vertical-align:middle;">I未暴露</span>';
    }
    html += '<td><span class="field-name">' + escapeHtml(f.target_field) + '</span>' + fieldBadge + '</td>';
    html += '<td><span class="field-type">' + escapeHtml(f.field_type || sf.type || '-') + '</span></td>';
    html += '<td><span style="font-size:12px;color:var(--text-secondary);">' + escapeHtml(f.field_comment || sf.meaning || '-') + '</span></td>';
    html += '<td><span class="source-info" style="font-size:12px;">' + escapeHtml(srcText) + '</span></td>';
    html += '<td>' + roleHtml + '</td>';
    var chainData = REPORT_DATA.field_chain_map || {};
    var chain = chainData[f.target_field.toLowerCase()];
    var chainSteps = chain ? chain.chains.length : 0;
    html += '<td style="font-size:12px;color:var(--text-muted);">' + (chainSteps > 0 ? chainSteps + ' 步' : '-') + '</td>';
    html += '<td style="font-size:11px;color:var(--text-muted);">' + escapeHtml(stepCode) + '</td>';
    html += '</tr>';
  });

  html += '</tbody>';
  document.getElementById('fieldMappingTable').innerHTML = html;

  // 辅助字段板块
  var auxFields = REPORT_DATA.auxiliary_fields || [];
  var auxContainer = document.getElementById('auxFieldsTable');
  if (auxContainer) {
    if (auxFields.length === 0) {
      auxContainer.innerHTML = '<div style="padding:12px;color:var(--text-muted);font-size:13px;">无辅助字段</div>';
    } else {
      var auxHtml = '<thead><tr>' +
        '<th style="width:5%">#</th>' +
        '<th style="width:28%">字段名</th>' +
        '<th style="width:42%">使用步骤</th>' +
        '<th style="width:25%">角色</th>' +
        '</tr></thead><tbody>';
      auxFields.forEach(function(af, ai) {
        var steps = [];
        var stepCodes = [];
        var allUsage = af.usage;
        var stepSet = {};
        ['join', 'where', 'groupby'].forEach(function(cat) {
          (allUsage[cat] || []).forEach(function(u) {
            if (!stepSet[u.step_name]) {
              stepSet[u.step_name] = true;
              steps.push(u.step_name);
              // 找 rule_code
              var st = (REPORT_DATA.steps || []).find(function(s) { return s.step_id === u.step_id || s.rule_name === u.step_name; });
              stepCodes.push(st ? (st.rule_code || '') : '');
            }
          });
        });
        var stepsText = steps.map(function(s, i) { return s + (stepCodes[i] ? ' (' + stepCodes[i] + ')' : ''); }).join(', ');
        var roleTags = af.roles.map(function(r) {
          var c = r === '关联键' ? '#f97316' : (r === '过滤' ? '#3b82f6' : '#8b5cf6');
          return '<span style="display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;color:white;background:' + c + ';margin-right:4px;">' + r + '</span>';
        }).join('');
        auxHtml += '<tr data-field="' + escapeHtml(af.field) + '" onmouseup="if(!window.getSelection().toString())openDetail(\'' + escapeHtml(af.field) + '\')" style="cursor:pointer;">';
        auxHtml += '<td style="font-size:12px;color:var(--text-muted);">' + (ai + 1) + '</td>';
        auxHtml += '<td><span class="field-name">' + escapeHtml(af.field) + '</span></td>';
        auxHtml += '<td style="font-size:12px;">' + escapeHtml(stepsText) + '</td>';
        auxHtml += '<td>' + roleTags + '</td>';
        auxHtml += '</tr>';
      });
      auxHtml += '</tbody>';
      auxContainer.innerHTML = auxHtml;
    }
  }
}

function handleFieldSearch() {
  var query = document.getElementById('fieldSearch').value.trim().toLowerCase();
  var rows = document.querySelectorAll('#fieldMappingTable tbody tr');
  var auxRows = document.querySelectorAll('#auxFieldsTable tbody tr');
  var noResults = document.getElementById('fieldNoResults');
  var anyVisible = false;

  // 支持空格分隔的多关键词联合搜索（AND 逻辑）
  var keywords = query ? query.split(/\s+/).filter(function(k) { return k; }) : [];

  function matchRow(row) {
    var text = row.textContent.toLowerCase();
    if (keywords.length === 0) {
      row.style.display = '';
      row.classList.remove('highlight');
      return true;
    }
    var match = keywords.every(function(kw) { return text.indexOf(kw) >= 0; });
    row.style.display = match ? '' : 'none';
    row.classList.toggle('highlight', match);
    return match;
  }

  rows.forEach(function(row) { if (matchRow(row)) anyVisible = true; });
  auxRows.forEach(function(row) { if (matchRow(row)) anyVisible = true; });

  noResults.style.display = anyVisible ? 'none' : '';
}

// ================================================================
// Section 7: Render Quality
// ================================================================
function renderQuality() {
  var q = REPORT_DATA.quality;
  if (!q) {
    document.getElementById('qualitySection').style.display = 'none';
    return;
  }

  var issues = q.issues || [];
  var aiInsights = q.ai_insights || [];  // 保留兼容（AI 洞察已移除）
  var complexity = q.complexity || {};
  document.getElementById('qualityCount').textContent = issues.length + ' 问题';

  var html = '';

  // Complexity stats — 用和其他板块一致的 metric-cards 风格
  if (complexity && Object.keys(complexity).length > 0) {
    html += '<div class="metric-cards" style="margin-bottom:16px;">';
    var stats = [
      { label: '最大JOIN数', value: complexity.max_join_count },
      { label: '源表总数', value: complexity.total_source_tables },
      { label: 'CTE数', value: complexity.max_cte_count || 0 },
      { label: '子查询', value: complexity.total_subquery_count || 0 },
      { label: 'CASE分支', value: complexity.total_case_when_branches || 0 }
    ];
    stats.forEach(function(st) {
      html += '<div class="metric-card"><div class="metric-value">' + (st.value !== undefined ? st.value : '-') + '</div><div class="metric-label">' + st.label + '</div></div>';
    });
    html += '</div>';
  }

  // Transform distribution
  var dist = complexity.transform_distribution || {};
  var distKeys = Object.keys(dist);
  if (distKeys.length > 0) {
    var total = distKeys.reduce(function(sum, k) { return sum + dist[k]; }, 0);
    if (total > 0) {
      html += '<div class="transform-dist">';
      html += '<div class="transform-dist-title">加工类型分布</div>';
      html += '<div class="dist-bar">';
      var distColors = {
        direct: '#22c55e', aggregate: '#3b82f6', pivot: '#f97316',
        case_when: '#8b5cf6', value: '#94a3b8', expression: '#0ea5e9',
        fallback: '#eab308', window: '#6366f1'
      };
      distKeys.forEach(function(k) {
        var pct = Math.round((dist[k] / total) * 100);
        if (pct > 0) {
          var bg = distColors[k] || '#94a3b8';
          html += '<div class="dist-segment" style="width:' + pct + '%;background:' + bg + ';" title="' + k + ': ' + dist[k] + '">' + (pct >= 8 ? dist[k] : '') + '</div>';
        }
      });
      html += '</div>';
      html += '<div class="dist-legend">';
      var distLabels = {
        direct: '直取', aggregate: '聚合', pivot: '行转列',
        case_when: '条件', value: '赋值', expression: '表达式',
        fallback: '兜底', window: '窗口'
      };
      distKeys.forEach(function(k) {
        var bg = distColors[k] || '#94a3b8';
        html += '<div class="dist-legend-item"><div class="dist-legend-dot" style="background:' + bg + ';"></div>' + (distLabels[k] || k) + ' (' + dist[k] + ')</div>';
      });
      html += '</div>';
      html += '</div>';
    }
  }

  // Issues — 按 category 分组，每组可折叠
  if (issues.length > 0) {
    // 按类别分组
    var groups = {};
    issues.forEach(function(iss) {
      var cat = iss.category || 'other';
      var catLabels = {
        'data_quality': '数据质量',
        'data_lineage': '数据血缘',
        'performance': '性能',
        'maintainability': '可维护性',
        'field_mapping': '字段映射',
        'other': '其他'
      };
      var catLabel = catLabels[cat] || cat;
      if (!groups[catLabel]) groups[catLabel] = [];
      groups[catLabel].push(iss);
    });

    var groupKeys = Object.keys(groups);
    html += '<div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:8px;">问题列表 <span style="font-weight:400;color:var(--text-muted);">(' + issues.length + ' 个，按类别分组)</span></div>';
    
    groupKeys.forEach(function(catLabel) {
      var catIssues = groups[catLabel];
      var hasMedium = catIssues.some(function(i) { return i.severity === 'medium' || i.severity === 'critical'; });
      var groupId = 'issueGroup_' + catLabel.replace(/[^a-zA-Z0-9]/g, '_');
      
      // 组头：可折叠
      html += '<div class="issue-group">';
      html += '<button class="issue-group-toggle' + (hasMedium ? '' : ' collapsed') + '" onclick="toggleIssueGroup(this)">';
      html += '<span class="toggle-arrow"' + (hasMedium ? '' : ' style="transform:rotate(90deg)"') + '>&#9654;</span>';
      html += '<span>' + escapeHtml(catLabel) + '</span>';
      html += '<span class="issue-group-count">' + catIssues.length + ' 个</span>';
      if (hasMedium) {
        html += '<span class="issue-group-warn">需关注</span>';
      }
      html += '</button>';
      
      // 组内问题列表
      html += '<div class="issue-group-body"' + (hasMedium ? '' : ' style="display:none;"') + '>';
      catIssues.forEach(function(iss) {
        html += '<div class="issue-item">';
        html += '<span class="issue-severity severity-' + (iss.severity || 'info') + '">' + escapeHtml(iss.severity || 'info') + '</span>';
        html += '<div>';
        html += '<div style="font-weight:500;">' + escapeHtml(iss.title || '');
        if (iss.rule_code) {
          html += ' <span style="font-size:11px;color:var(--text-muted);font-weight:400;">[' + escapeHtml(iss.rule_code) + ']</span>';
        }
        html += '</div>';
        var detail = iss.detail || iss.description || '';
        if (detail) html += '<div style="color:var(--text-secondary);font-size:12px;margin-top:2px;">' + escapeHtml(detail) + '</div>';
        // 类型不一致：显示两边类型对比
        if (iss.category === 'type_consistency' && iss.source_table && iss.current_table) {
          html += '<div style="font-size:12px;margin-top:4px;padding:4px 8px;background:var(--bg-secondary);border-radius:4px;">';
          html += '<span style="color:var(--text-muted);">' + escapeHtml(iss.source_table) + '.' + escapeHtml(iss.source_field || '') + '</span>';
          html += ' <code style="background:#fecaca;padding:1px 4px;border-radius:3px;">' + escapeHtml(iss.source_type || '?') + '</code>';
          html += ' <span style="color:var(--text-muted);">→</span> ';
          html += '<span style="color:var(--text-muted);">' + escapeHtml(iss.current_table) + '.' + escapeHtml(iss.field || '') + '</span>';
          html += ' <code style="background:#fecaca;padding:1px 4px;border-radius:3px;">' + escapeHtml(iss.current_type || '?') + '</code>';
          html += '</div>';
        }
        html += '</div>';
        html += '</div>';
      });
      html += '</div>'; // issue-group-body
      html += '</div>'; // issue-group
    });
  }

  if (!html) html = '<div class="no-results">无质量问题</div>';
  document.getElementById('qualityContent').innerHTML = html;
}

// ================================================================
// Detail Panel
// ================================================================
function openDetail(fieldName, scenario) {
  // 从 fields 列表找指定场景的字段
  var fieldEntry = (REPORT_DATA.fields || []).find(function(f) {
    return f.target_field === fieldName && (!scenario || f.scenario === scenario);
  });
  // fallback: 不限场景
  if (!fieldEntry) {
    fieldEntry = (REPORT_DATA.fields || []).find(function(f) { return f.target_field === fieldName; });
  }

  var schemaField = (REPORT_DATA.schema_fields || []).find(function(f) { return f.name === fieldName; });

  var detail = {
    target_field: fieldName,
    transform_type: fieldEntry ? fieldEntry.transform_type : (schemaField || {}).transform_type,
    meaning: (schemaField || {}).meaning || '',
    producing_step: fieldEntry ? fieldEntry.producing_step : '',
    sources: fieldEntry ? fieldEntry.sources : [],
  };

  // 找该场景内涉及该字段的步骤
  var allSteps = REPORT_DATA.steps || [];
  var fieldSteps = allSteps.filter(function(st) {
    // 步骤的场景必须和点击的场景一致（公共步骤也纳入）
    var stScenario = st.scenario_name || '';
    if (scenario && stScenario && stScenario !== scenario && stScenario !== '公共步骤') return false;
    return (REPORT_DATA.fields || []).some(function(f) {
      return f.target_field === fieldName && f.producing_step === st.step_id && (!scenario || f.scenario === scenario);
    });
  });
  // 倒序（最终步骤在上）
  fieldSteps.reverse();

  var panel = document.getElementById('detailPanel');
  var overlay = document.getElementById('detailOverlay');

  document.getElementById('detailTitle').textContent = detail.target_field || fieldName;

  var html = '';

  // 基本信息标签行（精简，不占大块空间）
  var chainData0 = REPORT_DATA.field_chain_map || {};
  var chain0 = chainData0[fieldName.toLowerCase()];
  var chainCount0 = chain0 ? chain0.chains.length : 0;
  var ttLabel0 = {'direct':'直取','value':'赋值','aggregate':'聚合','pivot':'行转列',
                  'window':'窗口','fallback':'兜底','case_when':'条件','expression':'加工','unknown':'未知'};
  var ttColor0 = {'direct':'#22c55e','value':'#6b7280','aggregate':'#f97316','pivot':'#8b5cf6',
                  'window':'#3b82f6','fallback':'#eab308','case_when':'#ec4899','expression':'#6366f1','unknown':'#94a3b8'};
  var tt0 = detail.transform_type || 'expression';
  var ttC0 = ttColor0[tt0] || '#94a3b8';
  var ttL0 = ttLabel0[tt0] || tt0;

  html += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">';
  html += '<span style="padding:3px 10px;border-radius:8px;font-size:12px;font-weight:600;color:white;background:' + ttC0 + ';">' + ttL0 + '</span>';
  if (chainCount0 > 0) {
    html += '<span style="padding:3px 10px;border-radius:8px;font-size:12px;background:var(--bg-secondary);color:var(--text-secondary);">链路 ' + chainCount0 + ' 步</span>';
  }
  if (detail.is_final_field === false) {
    html += '<span style="padding:3px 10px;border-radius:8px;font-size:12px;font-weight:600;color:#854d0e;background:#fef9c3;">中间过程字段</span>';
  }
  // 角色标签（关联/分组/过滤）
  var _usage = (REPORT_DATA.field_usage_map || {})[fieldName.toLowerCase()];
  if (_usage) {
    if (_usage.join && _usage.join.length > 0) {
      html += '<span style="padding:3px 10px;border-radius:8px;font-size:12px;font-weight:600;color:white;background:#f97316;">关联键</span>';
    }
    if (_usage.groupby && _usage.groupby.length > 0) {
      html += '<span style="padding:3px 10px;border-radius:8px;font-size:12px;font-weight:600;color:white;background:#8b5cf6;">分组</span>';
    }
    if (_usage.where && _usage.where.length > 0) {
      html += '<span style="padding:3px 10px;border-radius:8px;font-size:12px;font-weight:600;color:white;background:#3b82f6;">过滤</span>';
    }
  }
  html += '</div>';

  // Meaning
  if (detail.meaning) {
    html += '<div class="detail-section"><h4>业务含义</h4>';
    html += '<p style="font-size:14px;line-height:1.7;">' + escapeHtml(detail.meaning) + '</p>';
    html += '</div>';
  }

  // 用 field_chain_map 构建完整链路树（支持多场景分叉）
  var chainData = REPORT_DATA.field_chain_map || {};
  var fieldChain = chainData[fieldName.toLowerCase()];

  if (fieldChain && fieldChain.chains && fieldChain.chains.length > 0) {
    html += '<div class="detail-section"><h4>数据流链路</h4>';

    var chains = fieldChain.chains.slice().sort(function(a, b) {
      return (b.exec_sequence || 0) - (a.exec_sequence || 0);
    });

    var ttLabelMap = {'direct':'直取','value':'赋值','aggregate':'聚合','pivot':'行转列',
                      'window':'窗口','fallback':'兜底','case_when':'条件','expression':'加工'};
    var ttColorMap = {'direct':'#22c55e','value':'#6b7280','aggregate':'#f97316','pivot':'#8b5cf6',
                      'window':'#3b82f6','fallback':'#eab308','case_when':'#ec4899','expression':'#6366f1'};

    function renderChainNode(c) {
      var tt = c.transform_type || 'expression';
      var ttLabel = ttLabelMap[tt] || tt;
      var ttColor = ttColorMap[tt] || '#6b7280';
      var scTag = '';
      if (c.scenario && c.scenario !== '默认') {
        scTag = '<span style="display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;color:white;background:#8b5cf6;margin-right:6px;">' + escapeHtml(c.scenario) + '</span>';
      }
      var s = '';
      s += '<div style="padding:12px 16px;background:var(--bg-secondary);border:1px solid ' + ttColor + ';border-radius:8px;min-width:260px;max-width:380px;">';
      var codeTag = c.rule_code ? ' <span style="color:var(--text-muted);font-weight:400;font-size:12px;">(' + escapeHtml(c.rule_code) + ')</span>' : '';
      s += '<div style="font-weight:600;font-size:15px;margin-bottom:6px;">' + scTag + escapeHtml(c.rule_name || c.step_id) + codeTag + '</div>';
      // 加工表达式（非直取都显示）
      var rawSql = c.raw_sql || '';
      if (rawSql && tt !== 'direct') {
        s += '<div style="font-size:13px;font-family:monospace;color:var(--text-primary);background:var(--bg-card);padding:5px 8px;border-radius:4px;margin-bottom:6px;white-space:pre-wrap;word-break:break-all;line-height:1.5;">' + escapeHtml(rawSql) + '</div>';
      }
      // 来源字段
      if (c.sources && c.sources.length > 0) {
        c.sources.forEach(function(src) {
          var srcAlias = (src.alias || '').toLowerCase();
          var srcTable = src.table || '';
          var isSubquery = srcTable.startsWith('(subquery:') || srcTable.startsWith('(子查询');

          s += '<div style="font-size:13px;color:var(--text-secondary);line-height:1.7;">';
          // UNION 分支标记
          if (src.branch) {
            s += '<span style="display:inline-block;padding:1px 6px;border-radius:4px;font-size:11px;font-weight:600;color:white;background:#6366f1;margin-right:4px;">分支' + src.branch + '</span>';
          }
          s += '← <code style="color:var(--accent);font-size:13px;">' + escapeHtml(src.field || '?') + '</code>';
          if (isSubquery) {
            s += ' from <span style="color:#8b5cf6;">📦子查询</span>';
          } else {
            s += ' from ' + escapeHtml(srcTable);
          }
          s += ' <span style="display:inline-block;padding:1px 6px;border-radius:4px;font-size:11px;font-weight:600;color:white;background:' + ttColor + ';vertical-align:middle;">' + ttLabel + '</span>';
          s += '</div>';

          // 桥接路径（从 join_paths 查找该别名的关联链）
          var joinPaths = c.join_paths || {};
          var pathInfo = joinPaths[srcAlias] || joinPaths[srcAlias.toLowerCase()];
          if (pathInfo && pathInfo.path && pathInfo.path.length > 0) {
            s += '<details style="margin-top:4px;margin-left:16px;">';
            s += '<summary style="cursor:pointer;font-size:12px;color:var(--text-muted);">关联路径 (' + pathInfo.path.length + '层桥接)</summary>';
            s += '<div style="margin-top:4px;">';
            pathInfo.path.forEach(function(step, pi) {
              var stepAlias = step.to_alias || '';
              var stepTable = step.to_table || '';
              var stepIsSub = stepTable.startsWith('(subquery:') || stepTable.startsWith('(子查询');
              var onCond = step.on_condition || '';
              var jt = step.join_type || '';
              s += '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:2px;padding-left:' + (pi * 12) + 'px;border-left:2px solid var(--border);padding-left:8px;">';
              s += '<span style="font-weight:600;">' + escapeHtml(jt) + '</span> ';
              if (stepIsSub) {
                s += '📦子查询(' + escapeHtml(stepAlias) + ')';
              } else {
                s += escapeHtml(stepTable) + ' (' + escapeHtml(stepAlias) + ')';
              }
              if (onCond) {
                s += '<div style="font-family:monospace;font-size:10px;color:var(--text-muted);margin-top:1px;">ON ' + escapeHtml(onCond) + '</div>';
              }
              s += '</div>';
            });
            s += '</div>';
            s += '</details>';
          }

          // 子查询折叠
          if (isSubquery && pathInfo && (pathInfo.subquery_sql || (pathInfo.subquery_tables && pathInfo.subquery_tables.length > 0))) {
            s += '<details style="margin-top:4px;margin-left:16px;">';
            var tblCount = pathInfo.subquery_tables ? pathInfo.subquery_tables.length : 0;
            s += '<summary style="cursor:pointer;font-size:12px;color:#8b5cf6;">📦子查询 (' + tblCount + '张表)</summary>';
            if (pathInfo.subquery_tables && pathInfo.subquery_tables.length > 0) {
              var tblNames = pathInfo.subquery_tables.map(function(t) { return t[0]; });
              s += '<div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">内部表: ' + escapeHtml(tblNames.join(', ')) + '</div>';
            }
            if (pathInfo.subquery_sql) {
              var sqlPreview = pathInfo.subquery_sql;
              if (sqlPreview.length > 300) sqlPreview = sqlPreview.substring(0, 300) + '...';
              s += '<pre style="font-size:10px;font-family:monospace;background:var(--bg-card);padding:5px 8px;border-radius:4px;margin-top:4px;white-space:pre-wrap;word-break:break-all;max-height:150px;overflow:auto;">' + escapeHtml(sqlPreview) + '</pre>';
            }
            s += '</details>';
          }
        });

      // 关联键跨步骤追溯链（join_key_lineage）—— 仅对从表字段显示
      // 主表一路带过来的字段不涉及关联，不需要显示关联键追溯（避免冗余）
      var showJoinKeyLineage = false;
      var jp2 = c.join_paths || {};
      (c.sources || []).forEach(function(src) {
        var sa = (src.alias || '').toUpperCase();
        var jpInfo = jp2[sa] || Object.keys(jp2).find(function(k){return k.toUpperCase()===sa;});
        if (jpInfo && jp2[jpInfo] && jp2[jpInfo].is_primary === false) {
          showJoinKeyLineage = true;
        }
      });

      var jkl = c.join_key_lineage || {};
      var jklKeys = Object.keys(jkl);
      if (jklKeys.length > 0 && showJoinKeyLineage) {
        jklKeys.forEach(function(fieldKey) {
          var chains2 = jkl[fieldKey] || [];
          chains2.forEach(function(traceChain) {
            s += '<details style="margin-top:4px;margin-left:16px;">';
            s += '<summary style="cursor:pointer;font-size:12px;color:#3b82f6;">🔗 关联键 "' + escapeHtml(fieldKey) + '" 来源链（跨步骤追溯）</summary>';
            s += '<div style="margin-top:4px;">';
            function renderTraceNode(node, indent) {
              var ns = '';
              var shortTbl = (node.table || '').split('.').pop();
              var tt = node.transform || 'direct';
              var ttMap = {'direct':'直取','expression':'加工','case_when':'条件','fallback':'兜底','value':'赋值'};
              var ttLbl = ttMap[tt] || tt;
              var phys = node.is_physical;
              var alias = node.alias || '';
              var hasChildren = (node.children || []).length > 0;
              // 有子节点的中间节点：加工表达式从子节点取（子节点共享同一加工表达式）
              var childRawSql = '';
              if (hasChildren) {
                var firstChild = (node.children || [])[0] || {};
                if (firstChild.raw_sql && firstChild.transform !== 'direct') {
                  childRawSql = firstChild.raw_sql;
                }
              }

              ns += '<div style="margin-left:' + (indent * 14) + 'px;font-size:12px;color:var(--text-secondary);line-height:1.7;">';
              ns += '← <code style="color:var(--accent);">' + escapeHtml(node.field || '?') + '</code>';
              ns += ' from ' + escapeHtml(shortTbl);
              if (alias) {
                ns += ' <span style="font-size:11px;color:var(--text-muted);">(' + escapeHtml(alias) + ')</span>';
              }
              if (tt !== 'direct') {
                ns += ' <span style="color:#f97316;font-weight:600;">[' + ttLbl + ']</span>';
              }
              if (phys) {
                ns += ' <span style="color:#22c55e;font-weight:600;">★物理源表</span>';
              }
              ns += '</div>';

              // 加工表达式：有子节点且子节点是加工的，在关联上面展示一次
              if (hasChildren && childRawSql) {
                ns += '<div style="margin-left:' + (indent * 14 + 14) + 'px;font-size:11px;color:#f97316;margin-top:2px;font-family:monospace;background:var(--bg-card);padding:3px 8px;border-radius:4px;display:inline-block;">' + escapeHtml(childRawSql.substring(0, 60)) + '</div>';
              }

              // 多源加工节点：展示参与加工的表之间的关联关系
              var joinRels = node.join_relations || [];
              if (joinRels.length > 0) {
                ns += '<div style="margin-left:' + (indent * 14 + 14) + 'px;font-size:11px;color:#8b5cf6;margin-top:2px;">';
                ns += '关联: ';
                joinRels.forEach(function(r, ri) {
                  if (ri > 0) ns += '; ';
                  ns += escapeHtml(r.alias) + '=' + escapeHtml((r.table||'').split('.').pop()) + ' ' + escapeHtml(r.join_type||'') + ' ON ' + escapeHtml(r.on_condition||'');
                });
                ns += '</div>';
              }
              var children = node.children || [];
              for (var ci = 0; ci < children.length; ci++) {
                ns += renderTraceNode(children[ci], indent + 1);
              }
              return ns;
            }
            s += renderTraceNode(traceChain, 0);
            s += '</div>';
            s += '</details>';
          });
        });
      }
      } else if (tt === 'direct' && c.sources.length === 0) {
        s += '<div style="font-size:10px;color:var(--text-muted);">无来源</div>';
      } else {
        s += '<div style="font-size:10px;color:var(--text-muted);">' + ttLabel + '</div>';
      }
      s += '</div>';
      return s;
    }

    // 按 exec_sequence 分组（倒序：最终步骤在上）
    var seqGroups = {};
    var seqOrder = [];
    chains.forEach(function(c) {
      var seq = c.exec_sequence || 0;
      if (!seqGroups[seq]) { seqGroups[seq] = []; seqOrder.push(seq); }
      seqGroups[seq].push(c);
    });
    seqOrder.sort(function(a, b) { return b - a; });

    // 用层级 ID 渲染节点，渲染后用 SVG 画连线
    var treeId = 'chainTree_' + fieldName.replace(/\W/g, '_');
    html += '<div id="' + treeId + '" style="position:relative;padding:12px 0;">';

    seqOrder.forEach(function(seq, seqIdx) {
      var group = seqGroups[seq];
      var layerId = treeId + '_L' + seqIdx;

      if (group.length > 1) {
        html += '<div id="' + layerId + '" style="display:flex;gap:48px;justify-content:center;margin-bottom:20px;">';
        group.forEach(function(c, ci) {
          var cScenario = c.scenario || '';
          html += '<div class="chain-node-wrapper" data-layer="' + seqIdx + '" data-branch="' + ci + '" data-scenario="' + escapeHtml(cScenario) + '" data-step-id="' + escapeHtml(c.step_id || '') + '" style="display:flex;flex-direction:column;align-items:center;">';
          html += renderChainNode(c);
          html += '</div>';
        });
        html += '</div>';
      } else {
        html += '<div id="' + layerId + '" style="display:flex;justify-content:center;margin-bottom:20px;">';
        var c0 = group[0];
        var c0Scenario = c0.scenario || '';
        html += '<div class="chain-node-wrapper" data-layer="' + seqIdx + '" data-branch="0" data-scenario="' + escapeHtml(c0Scenario) + '" data-step-id="' + escapeHtml(c0.step_id || '') + '" style="display:flex;flex-direction:column;align-items:center;">';
          html += renderChainNode(c0);
          html += '</div>';
        html += '</div>';
      }
    });

    // SVG 连线放在 tree container 里面（absolute 定位相对于 treeId 的 position:relative）
    // SVG 本身 pointer-events:none（不挡住下面的卡片，卡片可选中可hover）
    // 只有 path 元素自己接收事件（在 drawChainLinks 里设 pointer-events:stroke）
    html += '<svg id="' + treeId + '_svg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:1;">';
    html += '</div>'; // tree container 闭合

    // 渲染后画连线
    setTimeout(function() { drawChainLinks(treeId, seqOrder.length, fieldName); }, 0);
  }

  // 字段使用信息（关联/分组/过滤）
  var usageMap = REPORT_DATA.field_usage_map || {};
  var usage = usageMap[fieldName.toLowerCase()];

  if (usage) {
    // 构建 step_name → rule_code 映射
    var stepCodeMap = {};
    (REPORT_DATA.steps || []).forEach(function(s) {
      stepCodeMap[s.step_name || s.rule_name || s.step_id] = s.rule_code || '';
      stepCodeMap[s.step_id] = s.rule_code || '';
    });
    function codeTag(name) {
      var code = stepCodeMap[name];
      return code ? ' <span style="color:var(--text-muted);font-weight:400;font-size:12px;">(' + escapeHtml(code) + ')</span>' : '';
    }

    // 按步骤分组渲染（序号 + 交替背景色）
    var stepColors = ['', 'var(--bg-secondary)'];

    function renderUsageByStep(items, renderFunc, sectionTitle) {
      if (!items || items.length === 0) return '';
      var html2 = '<div class="detail-section"><h4>' + sectionTitle + '</h4>';
      // 按 step_id 分组
      var groups = {};
      var groupOrder = [];
      items.forEach(function(item) {
        var key = item.step_id + '|' + (item.step_name || '');
        if (!groups[key]) { groups[key] = []; groupOrder.push({key: key, item: item}); }
        groups[key].push(item);
      });
      groupOrder.forEach(function(g, gi) {
        var bgColor = stepColors[gi % 2];
        var items2 = groups[g.key];
        var item0 = g.item;
        var scTag = item0.scenario && item0.scenario !== '默认' ? ' <span style="font-size:10px;color:var(--text-muted);">[' + escapeHtml(item0.scenario) + ']</span>' : '';
        html2 += '<div style="margin-bottom:8px;padding:8px 10px;background:' + bgColor + ';border-radius:6px;' + (bgColor ? '' : 'border:1px solid var(--border);') + '">';
        html2 += '<div style="font-weight:600;font-size:14px;margin-bottom:6px;">' + escapeHtml(item0.step_name || item0.step_id) + codeTag(item0.step_name || item0.step_id) + scTag + '</div>';
        items2.forEach(function(it, ii) {
          var num = '①②③④⑤⑥⑦⑧⑨⑩'[ii] || (ii + 1) + '.';
          html2 += renderFunc(it, num);
        });
        html2 += '</div>';
      });
      html2 += '</div>';
      return html2;
    }

    // 关联使用
    html += renderUsageByStep(usage.join, function(j, num) {
      var s = '<div style="margin-bottom:6px;">';
      s += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:2px;">' + num + ' ' + escapeHtml(j.join_type) + '</div>';
      s += '<div style="font-size:13px;font-family:monospace;color:var(--text-primary);background:var(--bg-card);padding:5px 8px;border-radius:4px;margin-bottom:4px;">' + escapeHtml(j.on_condition) + '</div>';
      if (j.tables && j.tables.length > 0) {
        s += '<div style="font-size:11px;color:var(--text-secondary);">';
        j.tables.forEach(function(t) {
          var isSub = t.table.startsWith('(子查询') || t.table.startsWith('(subquery:');
          s += '<span style="margin-right:8px;">' + escapeHtml(t.alias) + ' → ' + (isSub ? '<span style="color:#8b5cf6;">📦子查询</span>' : escapeHtml(t.table)) + '</span>';
        });
        s += '</div>';
      }
      s += '</div>';
      return s;
    }, '关联使用');

    // 分组
    html += renderUsageByStep(usage.groupby, function(g, num) {
      return '<div style="font-size:13px;margin-bottom:4px;color:var(--text-secondary);">' + num + ' GROUP BY ' + escapeHtml(fieldName) + '</div>';
    }, '分组');

    // 过滤条件
    html += renderUsageByStep(usage.where, function(w, num) {
      var condHtml = escapeHtml(w.condition);
      var fnEscaped = fieldName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      try {
        condHtml = condHtml.replace(new RegExp(fnEscaped, 'gi'), function(m) {
          return '<mark style="background:#fef08a;color:#854d0e;padding:1px 3px;border-radius:3px;font-weight:600;">' + m + '</mark>';
        });
      } catch(e) {}
      var s = '<div style="margin-bottom:6px;">';
      s += '<div style="font-size:13px;font-family:monospace;color:var(--text-primary);background:var(--bg-card);padding:5px 8px;border-radius:4px;">' + condHtml + '</div>';
      s += '</div>';
      return s;
    }, '过滤条件');
  }

  document.getElementById('detailBody').innerHTML = html;
  panel.classList.add('open');
  overlay.classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('detailOverlay').classList.remove('open');
}

// ── 链路树 SVG 连线（用 data_deps 过滤，只连有数据依赖的步骤）──
function drawChainLinks(treeId, layerCount, fieldName) {
  var tree = document.getElementById(treeId);
  var svg = document.getElementById(treeId + '_svg');
  if (!tree || !svg) return;

  // 用 offsetTop/offsetLeft 计算坐标（不受滚动影响）
  function getOffset(el, relativeTo) {
    var x = 0, y = 0;
    var node = el;
    while (node && node !== relativeTo) {
      x += node.offsetLeft || 0;
      y += node.offsetTop || 0;
      node = node.offsetParent;
    }
    return {x: x, y: y, w: el.offsetWidth, h: el.offsetHeight};
  }

  var treeOffset = {x: 0, y: 0, w: tree.offsetWidth, h: tree.offsetHeight};
  svg.setAttribute('width', treeOffset.w);
  svg.setAttribute('height', treeOffset.h);

  var lineColor = getComputedStyle(document.documentElement).getPropertyValue('--text-muted') || '#94a3b8';
  var paths = '';

  var chainMap = REPORT_DATA.field_chain_map || {};
  var fieldChain = chainMap[fieldName.toLowerCase()];
  if (!fieldChain) return;

  var deps = REPORT_DATA.data_deps || [];
  var fieldStepIds = {};
  fieldChain.chains.forEach(function(c) { fieldStepIds[c.step_id] = true; });

  function shouldConnect(sc1, sc2) {
    if (!sc1 || sc1 === '公共步骤' || sc1 === '默认') return true;
    if (!sc2 || sc2 === '公共步骤' || sc2 === '默认') return true;
    return sc1 === sc2;
  }

  var chains = fieldChain.chains;
  var seqGroups = {};
  var seqOrder = [];
  chains.forEach(function(c) {
    var seq = c.exec_sequence || 0;
    if (!seqGroups[seq]) { seqGroups[seq] = []; seqOrder.push(seq); }
    seqGroups[seq].push(c);
  });
  seqOrder.sort(function(a, b) { return b - a; });

  function findDomByStep(stepId) {
    for (var si = 0; si < seqOrder.length; si++) {
      var group = seqGroups[seqOrder[si]];
      var layer = document.getElementById(treeId + '_L' + si);
      if (!layer) continue;
      var nodes = layer.querySelectorAll('.chain-node-wrapper');
      for (var gi = 0; gi < group.length && gi < nodes.length; gi++) {
        if (group[gi].step_id === stepId) return nodes[gi];
      }
    }
    return null;
  }

  // ★ 入边/出边分组：同一目标(to)的多条入边、同一来源(from)的多条出边，
  //   连接点在卡片宽度内均匀分散，避免多条线挤在卡片中心重叠
  var outgoingByFrom = {};   // {from_stepId: [dep, ...]}
  var incomingByTo = {};     // {to_stepId: [dep, ...]}
  for (var di = 0; di < deps.length; di++) {
    var dep0 = deps[di];
    if (!fieldStepIds[dep0.from] || !fieldStepIds[dep0.to]) continue;
    var fc0 = fieldChain.chains.find(function(c) { return c.step_id === dep0.from; });
    var tc0 = fieldChain.chains.find(function(c) { return c.step_id === dep0.to; });
    if (fc0 && tc0 && !shouldConnect(fc0.scenario || '', tc0.scenario || '')) continue;
    (outgoingByFrom[dep0.from] = outgoingByFrom[dep0.from] || []).push(dep0);
    (incomingByTo[dep0.to] = incomingByTo[dep0.to] || []).push(dep0);
  }

  for (var di = 0; di < deps.length; di++) {
    var dep = deps[di];
    if (!fieldStepIds[dep.from] || !fieldStepIds[dep.to]) continue;

    var fromChain = fieldChain.chains.find(function(c) { return c.step_id === dep.from; });
    var toChain = fieldChain.chains.find(function(c) { return c.step_id === dep.to; });
    if (fromChain && toChain && !shouldConnect(fromChain.scenario || '', toChain.scenario || '')) continue;

    var fromDom = findDomByStep(dep.from);
    var toDom = findDomByStep(dep.to);
    if (!fromDom || !toDom) continue;

    var fromOff = getOffset(fromDom, tree);
    var toOff = getOffset(toDom, tree);

    // 出边连接点 x：同一来源的多条出边在卡片宽度内分散（不都取中心）
    var outs = outgoingByFrom[dep.from] || [dep];
    var outIdx = outs.indexOf(dep);
    var x1 = fromOff.x + fromOff.w * (outs.length > 1 ? (outIdx + 1) / (outs.length + 1) : 0.5);
    var y1 = fromOff.y;           // 下卡片顶部

    // 入边连接点 x：同一目标的多条入边在卡片宽度内分散
    var ins = incomingByTo[dep.to] || [dep];
    var inIdx = ins.indexOf(dep);
    var x2 = toOff.x + toOff.w * (ins.length > 1 ? (inIdx + 1) / (ins.length + 1) : 0.5);
    var y2 = toOff.y + toOff.h;   // 上卡片底部

    // 折线中点：在两层卡片之间的间隙中点走（避免压在卡片上）
    var midY = (y1 + y2) / 2;

    // path 加 class 和 data 属性，支持 hover 高亮
    paths += '<path class="chain-edge" data-from="' + escapeHtml(dep.from) + '" data-to="' + escapeHtml(dep.to) + '"'
           + ' d="M ' + x1 + ' ' + y1 + ' L ' + x1 + ' ' + midY + ' L ' + x2 + ' ' + midY + ' L ' + x2 + ' ' + y2 + '"'
           + ' stroke="' + lineColor + '" stroke-width="1.5" fill="none" opacity="0.6" />';
    paths += '<polygon class="chain-edge-arrow" data-from="' + escapeHtml(dep.from) + '" data-to="' + escapeHtml(dep.to) + '"'
           + ' points="' + (x2-5) + ',' + (y2+2) + ' ' + (x2+5) + ',' + (y2+2) + ' ' + x2 + ',' + (y2-5) + '"'
           + ' fill="' + lineColor + '" opacity="0.6" />';
  }

  svg.innerHTML = '<g>' + paths + '</g>';
  // ★ SVG 本身保持 pointer-events:none（不挡卡片），只让 path 元素接收事件
  // path 设 pointer-events:stroke（只有线的描边区域接收事件，中间空白不挡）
  svg.querySelectorAll('.chain-edge').forEach(function(p) {
    p.style.pointerEvents = 'stroke';
  });

  // ★ hover 高亮：鼠标进入某条连线时，该线变粗变亮，其他线变淡
  var chainEdges = svg.querySelectorAll('.chain-edge');
  var chainArrows = svg.querySelectorAll('.chain-edge-arrow');
  chainEdges.forEach(function(p, idx) {
    var fromId = p.getAttribute('data-from');
    var toId = p.getAttribute('data-to');
    var matchArrow = svg.querySelectorAll('.chain-edge-arrow[data-from="' + fromId + '"][data-to="' + toId + '"]');
    p.addEventListener('mouseenter', function() {
      // 当前线高亮
      p.setAttribute('stroke-width', '3');
      p.setAttribute('stroke', '#2563eb');
      p.setAttribute('opacity', '1');
      matchArrow.forEach(function(a) { a.setAttribute('fill', '#2563eb'); a.setAttribute('opacity', '1'); });
      // 其他线变淡
      chainEdges.forEach(function(other) {
        if (other !== p) other.setAttribute('opacity', '0.15');
      });
      chainArrows.forEach(function(other) {
        if (other.getAttribute('data-from') !== fromId || other.getAttribute('data-to') !== toId) {
          other.setAttribute('opacity', '0.15');
        }
      });
      // 起止卡片高亮边框
      var fromDom2 = findDomByStep(fromId);
      var toDom2 = findDomByStep(toId);
      if (fromDom2) fromDom2.style.outline = '2px solid #2563eb';
      if (toDom2) toDom2.style.outline = '2px solid #2563eb';
    });
    p.addEventListener('mouseleave', function() {
      // 还原所有线
      chainEdges.forEach(function(other) {
        other.setAttribute('stroke-width', '1.5');
        other.setAttribute('stroke', lineColor);
        other.setAttribute('opacity', '0.6');
      });
      chainArrows.forEach(function(other) {
        other.setAttribute('fill', lineColor);
        other.setAttribute('opacity', '0.6');
      });
      // 还原卡片边框
      var fromDom2 = findDomByStep(fromId);
      var toDom2 = findDomByStep(toId);
      if (fromDom2) fromDom2.style.outline = '';
      if (toDom2) toDom2.style.outline = '';
    });
  });

  // ★ 卡片 hover → 高亮相连线（双向触发：鼠标在卡片上也能高亮相关连线）
  // 找当前 tree 内所有卡片，hover 时高亮 data-from 或 data-to 等于此卡片的连线
  var treeEl = document.getElementById(treeId);
  if (treeEl) {
    var cardNodes = treeEl.querySelectorAll('.chain-node-wrapper[data-step-id]');
    cardNodes.forEach(function(card) {
      var cardStepId = card.getAttribute('data-step-id');
      if (!cardStepId) return;
      card.addEventListener('mouseenter', function() {
        // 高亮：from 或 to 等于此卡片的连线
        var hit = 0;
        chainEdges.forEach(function(p) {
          var pf = p.getAttribute('data-from');
          var pt = p.getAttribute('data-to');
          if (pf === cardStepId || pt === cardStepId) {
            p.setAttribute('stroke-width', '3');
            p.setAttribute('stroke', '#2563eb');
            p.setAttribute('opacity', '1');
            hit++;
          } else {
            p.setAttribute('opacity', '0.15');
          }
        });
        chainArrows.forEach(function(a) {
          var af = a.getAttribute('data-from');
          var at = a.getAttribute('data-to');
          if (af === cardStepId || at === cardStepId) {
            a.setAttribute('fill', '#2563eb');
            a.setAttribute('opacity', '1');
          } else {
            a.setAttribute('opacity', '0.15');
          }
        });
        if (hit > 0) card.style.outline = '2px solid #2563eb';
      });
      card.addEventListener('mouseleave', function() {
        chainEdges.forEach(function(other) {
          other.setAttribute('stroke-width', '1.5');
          other.setAttribute('stroke', lineColor);
          other.setAttribute('opacity', '0.6');
        });
        chainArrows.forEach(function(other) {
          other.setAttribute('fill', lineColor);
          other.setAttribute('opacity', '0.6');
        });
        card.style.outline = '';
      });
    });
  }
}

// ================================================================
// Event Listeners
// ================================================================
// 表搜索（筛选步骤卡片）
var _tableSearchTimer = null;
function handleTableSearch() {
  var query = document.getElementById('tableSearch').value.trim();
  var queryLower = query.toLowerCase();
  var cards = document.querySelectorAll('#stepsContainer .step-card');

  // 移除之前的高亮
  cards.forEach(function(card) {
    card.querySelectorAll('mark.table-hl').forEach(function(m) {
      var parent = m.parentNode;
      parent.replaceChild(document.createTextNode(m.textContent), m);
      parent.normalize();
    });
  });

  cards.forEach(function(card) {
    if (!query) {
      card.style.display = '';
      card.style.border = '';
      return;
    }
    var found = false;
    var text = card.textContent.toLowerCase();
    if (text.indexOf(queryLower) >= 0) found = true;

    if (found) {
      card.style.display = '';
      card.style.border = '2px solid var(--accent)';
      // 在逻辑块的 code（表名）里高亮匹配
      if (query.length >= 2) {
        card.querySelectorAll('code').forEach(function(codeEl) {
          var content = codeEl.textContent;
          var lower = content.toLowerCase();
          var idx = lower.indexOf(queryLower);
          if (idx >= 0) {
            var before = content.substring(0, idx);
            var match = content.substring(idx, idx + query.length);
            var after = content.substring(idx + query.length);
            codeEl.innerHTML = escapeHtml(before) + '<mark class="table-hl" style="background:#fef08a;color:#1e293b;padding:1px 2px;border-radius:2px;">' + escapeHtml(match) + '</mark>' + escapeHtml(after);
          }
        });
      }
    } else {
      card.style.display = 'none';
    }
  });
}
document.getElementById('tableSearch').addEventListener('input', function() {
  clearTimeout(_tableSearchTimer);
  _tableSearchTimer = setTimeout(handleTableSearch, 200);
});

// 字段搜索防抖（避免大数据量时每次按键都重排）
var _fieldSearchTimer = null;
document.getElementById('fieldSearch').addEventListener('input', function() {
  clearTimeout(_fieldSearchTimer);
  _fieldSearchTimer = setTimeout(handleFieldSearch, 200);
});
document.getElementById('detailClose').addEventListener('click', closeDetail);
document.getElementById('detailOverlay').addEventListener('click', closeDetail);
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeDetail(); });

// Quality collapsible
document.getElementById('qualityToggle').addEventListener('click', function() {
  this.classList.toggle('open');
  document.getElementById('qualityBody').classList.toggle('open');
});

// Field Mapping collapsible — default collapsed
document.getElementById('fieldMappingToggle').addEventListener('click', function() {
  this.classList.toggle('open');
  document.getElementById('fieldMappingBody').classList.toggle('open');
});

// 写入字段板块折叠
document.getElementById('writeFieldsToggle').addEventListener('click', function() {
  this.classList.toggle('open');
  document.getElementById('writeFieldsBody').classList.toggle('open');
  var arrow = this.querySelector('.toggle-arrow');
  arrow.innerHTML = this.classList.contains('open') ? '&#9660;' : '&#9654;';
});

// 辅助字段板块折叠
document.getElementById('auxFieldsToggle').addEventListener('click', function() {
  this.classList.toggle('open');
  document.getElementById('auxFieldsBody').classList.toggle('open');
  var arrow = this.querySelector('.toggle-arrow');
  arrow.innerHTML = this.classList.contains('open') ? '&#9660;' : '&#9654;';
});

// Issue group toggle (inline function used by onclick)
function toggleIssueGroup(btn) {
  var body = btn.nextElementSibling;
  var arrow = btn.querySelector('.toggle-arrow');
  if (body.style.display === 'none') {
    body.style.display = '';
    arrow.style.transform = '';
    btn.classList.remove('collapsed');
  } else {
    body.style.display = 'none';
    arrow.style.transform = 'rotate(90deg)';
    btn.classList.add('collapsed');
  }
}
window.toggleIssueGroup = toggleIssueGroup;

// Init
// ================================================================
renderHeader();
renderOverview();
renderLineage();
renderSteps();
renderFieldMapping();
renderQuality();
